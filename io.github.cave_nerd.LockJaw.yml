app-id: io.github.cave_nerd.LockJaw
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: lockjaw

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/lockjaw/cargo
    RUST_BACKTRACE: '1'

finish-args:
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --filesystem=xdg-config/lockjaw:create
  # OS keyring access for WebDAV password storage (GNOME Keyring / KWallet)
  - --talk-name=org.freedesktop.secrets

modules:
  - name: lockjaw
    buildsystem: simple
    build-commands:
      # Offline Cargo build using pre-fetched sources
      - cargo --offline fetch --manifest-path Cargo.toml
      - cargo --offline build --release -p lj-ui
      # Install binary
      - install -Dm755 target/release/lockjaw /app/bin/lockjaw
      # Desktop entry
      - install -Dm644 io.github.cave_nerd.LockJaw.desktop
          /app/share/applications/io.github.cave_nerd.LockJaw.desktop
      # Icons
      - install -Dm644 dist/LockJaw.AppDir/lockjaw.png
          /app/share/icons/hicolor/256x256/apps/io.github.cave_nerd.LockJaw.png
      # AppStream metainfo
      - install -Dm644 io.github.cave_nerd.LockJaw.metainfo.xml
          /app/share/metainfo/io.github.cave_nerd.LockJaw.metainfo.xml

    sources:
      # The source code — update the tag/commit for each release
      - type: git
        url: https://github.com/cave-nerd/lock-jaw.git
        tag: v0.1.0
        commit: df1fb4ccefd8022622ad3254277d3fec44671434

      # Pre-fetched Cargo registry (generated by flatpak-cargo-generator.py)
      - cargo-sources.json
